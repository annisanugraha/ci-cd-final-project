apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
  steps:
    - name: remove-files
      image: alpine:latest
      script: |
        #!/bin/sh
        rm -rf $(workspaces.source.path)/*
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  workspaces:
    - name: source
  steps:
    - name: run-jest
      image: node:18
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        npm ci
        npm test
